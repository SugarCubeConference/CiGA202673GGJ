<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>死亡锚点地图编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title-block">
          <h1>死亡锚点地图编辑器</h1>
          <p id="statusText">摆放机关后可以直接试玩，也可以下载运行时关卡 JSON。</p>
        </div>
        <div class="top-actions">
          <button id="playBtn" type="button">试玩</button>
          <button id="stopPlayBtn" type="button" hidden>退出试玩</button>
          <button id="downloadLevelBtn" type="button">下载关卡JSON</button>
          <button id="saveBtn" type="button">保存</button>
          <button id="copyBriefBtn" type="button">复制同步稿</button>
          <button id="resetBtn" type="button">恢复样例</button>
        </div>
      </header>

      <aside class="tools">
        <section>
          <h2>绘制</h2>
          <div id="toolGrid" class="tool-grid"></div>
        </section>

        <section>
          <h2>画布</h2>
          <label class="field">
            <span>标题</span>
            <input id="titleInput" type="text" />
          </label>
          <label class="field">
            <span>世界宽</span>
            <input id="worldWInput" type="number" min="1024" step="32" />
          </label>
          <label class="field">
            <span>世界高</span>
            <input id="worldHInput" type="number" min="576" step="32" />
          </label>
          <label class="field">
            <span>网格</span>
            <input id="gridInput" type="number" min="16" max="64" step="16" />
          </label>
          <label class="check">
            <input id="snapInput" type="checkbox" checked />
            <span>吸附网格</span>
          </label>
          <label class="field">
            <span>水平镜头</span>
            <input id="cameraXInput" type="range" min="0" value="0" />
          </label>
          <label class="field">
            <span>垂直镜头</span>
            <input id="cameraYInput" type="range" min="0" value="0" />
          </label>
        </section>

        <section>
          <h2>操作</h2>
          <div class="stack">
            <button id="blankBtn" type="button">新建空白</button>
            <button id="duplicateBtn" type="button">复制选中</button>
            <button id="rotateBtn" type="button">旋转选中</button>
            <button id="deleteBtn" type="button">删除选中</button>
            <button id="fitBtn" type="button">回到起点</button>
          </div>
        </section>
      </aside>

      <main class="stage">
        <canvas id="mapCanvas" width="1024" height="576" tabindex="0"></canvas>
      </main>

      <aside class="side">
        <section>
          <h2>关卡意图</h2>
          <label class="field wide">
            <span>规则 / 机制假设</span>
            <textarea id="ruleNotesInput" rows="4"></textarea>
          </label>
          <label class="field wide">
            <span>玩家体验目标</span>
            <textarea id="experienceInput" rows="3"></textarea>
          </label>
        </section>

        <section>
          <h2>选中对象</h2>
          <div id="emptyInspector" class="empty">未选择对象</div>
          <form id="inspector" class="inspector"></form>
        </section>

        <section>
          <h2>校验</h2>
          <div id="validation" class="validation"></div>
        </section>

        <section>
          <h2>导入 / 导出</h2>
          <div class="io-grid">
            <button id="exportBtn" type="button">编辑器 JSON</button>
            <button id="exportLevelBtn" type="button">关卡 JSON</button>
            <button id="copyJsonBtn" type="button">复制 JSON</button>
            <button id="importBtn" type="button">导入 JSON</button>
            <button id="importFileBtn" type="button">导入JSON文件</button>
            <button id="loadBtn" type="button">读取保存</button>
          </div>
          <input id="fileInput" type="file" accept=".json,application/json" hidden />
          <textarea id="jsonBox" spellcheck="false"></textarea>
        </section>
      </aside>
    </div>

    <script src="./editor.js?v=auto-platform-no-button1"></script>
  </body>
</html>
